name: ساخت خودکار فایل APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ دریافت کدها
        uses: actions/checkout@v4

      - name: 2️⃣ نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3️⃣ نصب وابستگی‌ها
        run: npm ci

      - name: 4️⃣ نصب Java (برای Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 5️⃣ تنظیم مجوز برای gradlew
        run: chmod +x android/gradlew

      - name: 6️⃣ تنظیم EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 7️⃣ ساخت APK
        run: eas build --local --platform android --non-interactive --output ./app-build.apk

      - name: 8️⃣ ذخیره فایل
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./app-build.apk
          retention-days: 30