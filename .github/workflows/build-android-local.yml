name: ساخت خودکار فایل APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# این قسمت اجازه می‌دهد وورک‌فلو برای تست Node.js 24 اجرا شود
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ دریافت کدها
        uses: actions/checkout@v4

      - name: 2️⃣ نصب Node.js 22 (نسخه پایدار و سازگار)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3️⃣ نصب وابستگی‌ها
        run: npm ci

      - name: 4️⃣ آماده‌سازی EAS (برای بیلد محلی)
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 5️⃣ بیلد گرفتن APK (محلی و رایگان)
        run: eas build --local --platform android --non-interactive --output ./app-build.apk

      - name: 6️⃣ آپلود فایل نهایی
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./app-build.apk
          retention-days: 30