name: ساخت خودکار فایل APK (بدون نیاز به EAS)

on:
  push:
    branches: [ main, master ]  # وقتی روی main یا master کد می‌زنید، کار شروع شود
  workflow_dispatch:            # این گزینه باعث می‌شود یک دکمه برای اجرای دستی در گیت‌هاب داشته باشید

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1️⃣ دریافت آخرین کدها
        uses: actions/checkout@v4

      - name: 2️⃣ نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: 3️⃣ نصب وابستگی‌ها (dependencies)
        run: npm ci

      - name: 4️⃣ تنظیم `EAS CLI` و لاگین با توکن
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 5️⃣ ساخت فایل APK (به صورت محلی و بدون نیاز به اعتبار)
        # --local : کلید جادویی! یعنی خود گیت‌هاب بسازد
        # -p android : برای اندروید
        # --output : نام فایل خروجی را مشخص می‌کند
        run: eas build --local --platform android --non-interactive --output ./app-build.apk

      - name: 6️⃣ ذخیره فایل ساخته شده
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./app-build.apk
          retention-days: 30   # فایل به مدت 30 روز در گیت‌هاب نگهداری می‌شود